<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Focus Kiosk — Working Local</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/kiosk.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-left">
      <img
        src="https://workinglocal.be/wp-content/uploads/2023/12/Digitale-onafhankelijkheid-1.png"
        alt="Working Local"
        class="header-logo"
        onerror="this.style.display='none'; document.getElementById('header-logo-fallback').style.display='block';"
      />
      <span id="header-logo-fallback" class="header-logo-fallback" style="display:none">Working Local</span>
      <div class="header-datetime">
        <div class="header-date" id="date-display">—</div>
        <div class="header-time" id="time-display">—:——:——</div>
      </div>
    </div>
    <div class="header-right">
      <div class="header-join-label">Participants join at:</div>
      <div class="header-join-url" id="join-url">loading…</div>
    </div>
  </header>

  <!-- ── Block bar ──────────────────────────────────────────────────────── -->
  <div class="block-bar">
    <div class="block-bar-display" id="block-display">Blok 1</div>
  </div>

  <!-- ── Main ───────────────────────────────────────────────────────────── -->
  <main class="main">

    <!-- Timer section -->
    <section class="timer-section">
      <div class="phase-label" id="phase-label"></div>

      <div class="timer-ring-container">
        <svg class="progress-ring" viewBox="0 0 400 400" aria-hidden="true" id="progress-ring-svg">
          <g transform="rotate(-90, 200, 200)">
            <circle class="ring-bg" cx="200" cy="200" r="185" />
            <g id="ring-ticks"></g>
            <circle class="ring-track idle" id="ring-track" cx="200" cy="200" r="185" />
          </g>
        </svg>
        <div class="timer-display" id="timer-display">25:00</div>
      </div>

      <div class="timer-hint" id="timer-hint">Ready to start</div>

      <div class="controls">
        <button class="btn btn-focus" id="btn-focus" aria-label="Start Focus Block">
          <span class="btn-icon">▶</span>
          <span>Start Focus</span>
        </button>
        <button class="btn btn-break" id="btn-break" aria-label="Start Break">
          <span class="btn-icon">☕</span>
          <span>Start Break</span>
        </button>
        <button class="btn btn-stop" id="btn-stop" aria-label="Stop Timer" disabled>
          <span class="btn-icon">■</span>
          <span>Stop</span>
        </button>
        <button class="btn btn-pause" id="btn-pause" aria-label="Pause Timer" disabled>
          <span class="btn-icon">⏸</span>
          <span>Pause</span>
        </button>
        <button class="btn btn-next" id="btn-next" aria-label="Next Block">
          <span class="btn-icon">⏭</span>
          <span>Next Block</span>
        </button>
        <button class="btn btn-reset" id="btn-reset" aria-label="Reset Session">
          <span class="btn-icon">↺</span>
          <span>Reset</span>
        </button>
      </div>
    </section>

    <!-- Participants section -->
    <aside class="participants-section">
      <div class="participants-header">
        <span class="participants-title">Participants</span>
        <span class="participants-count" id="participants-count">0</span>
      </div>
      <div class="participants-list" id="participants-list">
        <div class="empty-state">
          <div class="empty-icon">◎</div>
          <div class="empty-text">No participants yet</div>
          <div class="empty-sub">Share the join link above</div>
        </div>
      </div>
    </aside>

  </main>

  <!-- ── Status bar ─────────────────────────────────────────────────────── -->
  <footer class="status-bar">
    <span class="status-app">Working Local · Focus Kiosk v1.2.0</span>
    <div class="lang-toggle">
      <button class="lang-btn" data-lang="nl">NL</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
    <span class="status-connection" id="connection-status">Verbinden…</span>
  </footer>

  <!-- ── Reset confirm modal ───────────────────────────────────────────── -->
  <div class="modal-overlay" id="reset-modal" style="display:none">
    <div class="modal">
      <h2>Reset Session?</h2>
      <p>This will clear all participants and return to Block 1. This cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn btn-reset-confirm" id="btn-reset-confirm">Yes, Reset</button>
        <button class="btn btn-cancel" id="btn-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/kiosk.js"></script>
</body>
</html>
