<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Join — Working Local Focus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/join.css" />
</head>
<body>

  <div class="page">

    <!-- ── Logo / branding ─────────────────────────────────────────────── -->
    <div class="brand">
      <div class="brand-row">
        <div class="brand-identity">
          <img
            src="https://workinglocal.be/wp-content/uploads/2023/12/Digitale-onafhankelijkheid-1.png"
            alt="Working Local"
            class="brand-logo"
            onerror="this.style.display='none'; document.getElementById('brand-fallback').style.display='flex';"
          />
          <div id="brand-fallback" class="brand-fallback" style="display:none">
            <div class="brand-mark">◉</div>
            <div class="brand-name">Working Local</div>
          </div>
        </div>
        <div class="lang-toggle">
          <button class="lang-btn" data-lang="nl">NL</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
      </div>
      <div class="brand-sub" id="brand-sub-el">Focussessie</div>
    </div>

    <!-- ── Registration form ───────────────────────────────────────────── -->
    <section id="form-section">
      <form id="join-form" novalidate>

        <!-- Name -->
        <div class="field-group">
          <label class="field-label" id="name-label-el" for="name">Jouw naam</label>
          <input
            type="text"
            id="name"
            name="name"
            class="field-input"
            placeholder="bijv. Alex"
            maxlength="60"
            autocomplete="name"
            autocorrect="off"
            spellcheck="false"
          />
        </div>

        <!-- Block count -->
        <div class="field-group">
          <label class="field-label" id="blocks-label-el">Focus blokken</label>
          <div class="block-choice">
            <label class="choice-card" id="choice-6">
              <input type="radio" name="blockCount" value="6" />
              <div class="choice-body">
                <div class="choice-title" id="choice-6-title">6 Blokken</div>
                <div class="choice-sub" id="choice-6-sub">~3 uur</div>
              </div>
            </label>
            <label class="choice-card" id="choice-12">
              <input type="radio" name="blockCount" value="12" />
              <div class="choice-body">
                <div class="choice-title" id="choice-12-title">12 Blokken</div>
                <div class="choice-sub" id="choice-12-sub">~6 uur</div>
              </div>
            </label>
          </div>
        </div>

        <!-- Task fields (revealed after block count selection) -->
        <div id="tasks-section" class="tasks-section" style="display:none">
          <div class="tasks-header">
            <span class="field-label" id="tasks-label-el">Taken per blok</span>
            <span class="tasks-hint" id="tasks-hint-el">Waar werk je aan in elk 25-minutenblok?</span>
          </div>
          <div id="tasks-container"></div>
        </div>

        <!-- Error message -->
        <div id="error-msg" class="error-msg" role="alert"></div>

        <!-- Submit -->
        <button type="submit" class="btn-submit" id="btn-submit" disabled>
          Sessie deelnemen
        </button>

      </form>
    </section>

    <!-- ── Confirmation / participant view ─────────────────────────────── -->
    <section id="confirm-section" style="display:none">

      <div class="confirm-card">
        <div class="confirm-check">✓</div>
        <h2 class="confirm-title">You're in, <span id="confirm-name"></span>!</h2>
        <p class="confirm-meta"><span id="confirm-blocks"></span> registered</p>
      </div>

      <div class="session-panel">
        <div class="session-row">
          <span class="session-label" id="current-block-label-el">Huidig blok</span>
          <span class="session-value" id="current-block">—</span>
        </div>
        <div class="session-row">
          <span class="session-label" id="phase-label-el">Fase</span>
          <span class="phase-badge idle" id="current-phase">Wachten</span>
        </div>
        <div class="session-row">
          <span class="session-label" id="timer-label-el">Timer</span>
          <span class="session-value timer-value" id="current-timer">—:——</span>
        </div>
        <div class="my-task-box">
          <div class="my-task-label" id="my-task-label-el">Jouw taak dit blok:</div>
          <div class="my-task-text" id="my-task">—</div>
        </div>
      </div>

      <button class="btn-update" id="btn-update-el" onclick="location.reload()">Taken bijwerken</button>

    </section>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/join.js"></script>
</body>
</html>
